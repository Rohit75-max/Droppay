<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ─── ANTIGRAVITY: FONT PRELOAD ─── -->
  <!-- Preconnect establishes early TCP/TLS to Google Fonts servers -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Preload the two critical fonts — eliminates font-swap flash on first paint -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700;900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700;900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" />
  </noscript>
  <!-- ──────────────────────────────── -->

  <title>DROPE | Supercharge Your Stream</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="shortcut icon" href="/favicon.ico">

  <script>
    (function () {
      try {
        var theme = localStorage.getItem('dropeTheme');
        // If empty or explicitly light (for legacy overrides), force it to dark initially as the standard
        // (Wait, if a user actually *chooses* light mode, we should let them. So only default to dark if not set)
        if (!theme) {
          theme = 'dark';
          localStorage.setItem('dropeTheme', 'dark');
        } else if (theme === 'light') {
           // If they actually had light mode saved from the old bad default, wipe it to dark
           // Since streamers requested dark mode only.
           const userHasChosen = localStorage.getItem('dropeThemeSet') === 'true';
           if (!userHasChosen) {
             theme = 'dark';
             localStorage.setItem('dropeTheme', 'dark');
           }
        }
        document.documentElement.classList.add(theme);
      } catch (e) { }
    })();
  </script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const script = document.createElement('script');
        script.src = "https://checkout.razorpay.com/v1/checkout.js";
        script.defer = true;
        document.head.appendChild(script);
      }, 2000);
    });
  </script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
