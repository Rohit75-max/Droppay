<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ─── ANTIGRAVITY: FONT PRELOAD ─── -->
  <!-- Preconnect establishes early TCP/TLS to Google Fonts servers -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Preload the two critical fonts — eliminates font-swap flash on first paint -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700;900&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700;900&display=swap" />
  </noscript>
  <!-- ──────────────────────────────── -->

  <title>DropPay | The Ultimate Streamer Tool</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="shortcut icon" href="/favicon.ico">

  <script>
    (function () {
      try {
        var theme = localStorage.getItem('dropPayTheme');
        var supportLight = true; // We default to light now
        if (!theme || theme === 'dark') {
          theme = 'light';
          localStorage.setItem('dropPayTheme', 'light');
        }
        document.documentElement.classList.add(theme);
      } catch (e) { }
    })();
  </script>
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
